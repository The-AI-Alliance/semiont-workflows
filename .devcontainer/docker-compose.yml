services:
  # Development workspace container
  # Backend and frontend run as posix processes inside this container
  # (managed by semiont start, same as local setup)
  demo-workspace:
    image: mcr.microsoft.com/devcontainers/typescript-node:1-22-bookworm
    volumes:
      - ..:/workspaces/semiont-workflows:cached
    command: sleep infinity
    environment:
      SEMIONT_VERSION: ${SEMIONT_VERSION}
    ports:
      - "3000:3000"  # Frontend (for Envoy to reach)
      - "4000:4000"  # Backend (for Envoy to reach)

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: semiont
      POSTGRES_USER: semiont
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semiont}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semiont -d semiont"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Envoy Proxy - Single public entry point
  envoy:
    image: envoyproxy/envoy:v1.28-latest
    restart: unless-stopped
    depends_on:
      demo-workspace:
        condition: service_started
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080"  # Public entry point
      - "9901:9901"  # Admin interface

volumes:
  postgres_data:
